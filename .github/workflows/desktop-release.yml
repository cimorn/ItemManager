name: Desktop Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Set release file name
        shell: pwsh
        run: |
          $date = Get-Date -Format 'yy.MM.dd'
          "APP_RELEASE_DATE=$date" >> $env:GITHUB_ENV
          "APP_RELEASE_NAME=ItemManager" >> $env:GITHUB_ENV
          "RELEASE_FILE=ItemManager-V$date.exe" >> $env:GITHUB_ENV

      - name: Build desktop app
        shell: pwsh
        run: |
          pnpm build
          node node_modules/electron/install.js
          pnpm exec electron-builder --win zip
          node electron/flatten-dist.js

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: ItemManager-V${{ env.APP_RELEASE_DATE }}
          path: dist/ItemManager-V${{ env.APP_RELEASE_DATE }}.exe
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ env.RELEASE_FILE }}
